<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oil Rig Rescue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay">
        <h1 class="title">OIL RIG RESCUE</h1>
        
        <p class="mission">
            You’ve been deployed to a collapsing offshore oil rig.
            Oil mutations have taken over the platform.
            Fight your way through the infected,
            reach the control room,
            and stabilize the rig before a catastrophic spill destroys the ocean ecosystem.
        </p>

        <button id="startButton">START MISSION</button>
    </div>

    <script>
        document.getElementById("startButton").addEventListener("click", function() {
            window.location.href = "game.html";
        });
    </script>

</body>
</html>
